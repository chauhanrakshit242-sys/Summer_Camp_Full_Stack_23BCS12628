<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Carousel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="carousel" id="carousel">
    
    <div class="slides">
      <img src="https://picsum.photos/id/1015/600/300" class="slide active">
      <img src="https://picsum.photos/id/1016/600/300" class="slide">
      <img src="https://picsum.photos/id/1025/600/300" class="slide">
      <img src="https://picsum.photos/id/1035/600/300" class="slide">
    </div>

    <button class="prev" onclick="prevSlide()">❮</button>
    <button class="next" onclick="nextSlide()">❯</button>

  </div>

  <script src="script.js"></script>
</body>
</html>
